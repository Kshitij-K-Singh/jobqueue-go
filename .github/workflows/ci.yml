name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false   # No external dependencies / no go.sum

      - name: Test
        run: go test -v ./...

  docker:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v5
      - name: Build Docker image
        run: docker build -t jobqueue-go:ci .

  scan:
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - uses: actions/checkout@v5
      - name: Build image for scan
        run: docker build -t jobqueue-go:ci .
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: jobqueue-go:ci
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH